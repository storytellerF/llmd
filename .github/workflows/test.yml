name: Test

on:
  pull_request:
    branches: ["main"]
    paths:
      - "apps/**"
      - "crates/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/android-release.yml"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Check shell scripts
        run: bash -n scripts/*.sh

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build

  android-compile:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: "28.2.13676358"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Configure preinstalled Android SDK
        run: |
          test -d "${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Compile Android Kotlin and AIDL
        working-directory: apps/desktop/src-tauri/gen/android
        run: |
          ../../../../../scripts/sync-tauri-android-overrides.sh
          ./gradlew :app:compileArm64DebugKotlin --no-daemon
