name: Test

on:
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
      - "cli/**"
      - "crates/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/android-release.yml"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Run static checks
        run: ./scripts/check-static.sh --host

      - name: Run Rust tests
        run: cargo test --workspace --locked

  android-compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Configure preinstalled Android SDK
        run: |
          test -d "${ANDROID_HOME}"
          test -d "${ANDROID_SDK_ROOT}"
          test -d "${ANDROID_NDK_HOME}"
          echo "NDK_HOME=${ANDROID_NDK_HOME}" >> "$GITHUB_ENV"

      - name: Compile Android Kotlin and AIDL
        working-directory: app/src-tauri/gen/android
        run: |
          ../../../../scripts/check-static.sh --android-kotlin
